[pytest]
# Without this, "pytest" (bare) doesn't put this directory on sys.path,
# so "from validation.validators import ..." etc. fail with
# ModuleNotFoundError even though "python -m pytest" works fine (python -m
# adds the cwd to sys.path automatically; bare pytest does not). This makes
# every invocation style behave the same: terminal, CI, and IDE test runners.
pythonpath = .